name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build release (musl static)
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/keyflow

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: target/release/keyflow.exe

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add target
        run: rustup target add x86_64-apple-darwin
      - name: Build release
        run: cargo build --release --target x86_64-apple-darwin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: target/x86_64-apple-darwin/release/keyflow

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add target
        run: rustup target add aarch64-apple-darwin
      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: target/aarch64-apple-darwin/release/keyflow

  publish:
    needs: [build-linux, build-windows, build-macos-x86_64, build-macos-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine prerelease
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE 'rc\.[0-9]+$'; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"

          # Linux (musl static)
          DIST_NAME="keyflow-${VERSION}-linux-x86_64"
          mkdir -p "${DIST_NAME}"
          cp artifacts/linux-x86_64/keyflow "${DIST_NAME}/"
          chmod +x "${DIST_NAME}/keyflow"
          cp packaging/dist/Makefile "${DIST_NAME}/"
          cp packaging/dist/README.md "${DIST_NAME}/INSTALL.md"
          cp packaging/systemd/keyflow.service "${DIST_NAME}/"
          cp keyflow.toml.example "${DIST_NAME}/"
          cp README.md "${DIST_NAME}/"
          tar -czf "${DIST_NAME}.tar.gz" "${DIST_NAME}"

          # Windows
          DIST_NAME="keyflow-${VERSION}-windows-x86_64"
          mkdir -p "${DIST_NAME}"
          cp artifacts/windows-x86_64/keyflow.exe "${DIST_NAME}/"
          cp packaging/windows/install.ps1 "${DIST_NAME}/"
          cp keyflow.toml.example "${DIST_NAME}/"
          cp README.md "${DIST_NAME}/"
          zip -r "${DIST_NAME}.zip" "${DIST_NAME}"

          # macOS x86_64
          DIST_NAME="keyflow-${VERSION}-macos-x86_64"
          mkdir -p "${DIST_NAME}"
          cp artifacts/macos-x86_64/keyflow "${DIST_NAME}/"
          chmod +x "${DIST_NAME}/keyflow"
          cp keyflow.toml.example "${DIST_NAME}/"
          cp README.md "${DIST_NAME}/"
          tar -czf "${DIST_NAME}.tar.gz" "${DIST_NAME}"

          # macOS aarch64
          DIST_NAME="keyflow-${VERSION}-macos-aarch64"
          mkdir -p "${DIST_NAME}"
          cp artifacts/macos-aarch64/keyflow "${DIST_NAME}/"
          chmod +x "${DIST_NAME}/keyflow"
          cp keyflow.toml.example "${DIST_NAME}/"
          cp README.md "${DIST_NAME}/"
          tar -czf "${DIST_NAME}.tar.gz" "${DIST_NAME}"

          # List assets
          echo "ASSETS<<EOF" >> "$GITHUB_ENV"
          ls -1 *.tar.gz *.zip >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: KeyFlow ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            keyflow-*.tar.gz
            keyflow-*.zip
